<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advance Quiz - Trading Ek Mission</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.option{
display:block;
margin:10px;
padding:10px;
background:#334155;
border-radius:5px;
cursor:pointer;
}

.option:hover{
background:#475569;
}

#timer{
font-size:20px;
margin-bottom:15px;
color:#facc15;
}

#certificate{
display:none;
background:white;
color:black;
padding:30px;
margin-top:30px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Advance Trading Quiz</h1>

<input id="username" placeholder="Enter your name for certificate" style="padding:10px;width:80%;margin-bottom:20px">

<div id="timer">Time: 10:00</div>

<div id="quiz"></div>

<button onclick="nextQuestion()">Next</button>

<div id="result"></div>

<button id="downloadBtn" style="display:none" onclick="downloadCertificate()">Download Certificate</button>

<div id="certificate">
<img src="logo.png" width="120"><br><br>

<h2>Trading Ek Mission</h2>

<h3>Certificate of Completion</h3>

<p>This certifies that</p>

<h2 id="certName"></h2>

<p>has successfully completed the</p>

<h3>Advanced Stock Market Course</h3>

<p id="certScore"></p>

<p>Congratulations on your achievement!</p>

</div>

</div>

<script>

let questions = [

{question:"What does RSI measure?",a:"Market liquidity",b:"Price volatility",c:"Overbought and oversold conditions",d:"Company earnings",correct:"c"},
{question:"Which pattern indicates bullish reversal?",a:"Head & Shoulders",b:"Double Bottom",c:"Bear Flag",d:"Descending Triangle",correct:"b"},
{question:"MACD stands for?",a:"Market Avg Convergence Divergence",b:"Moving Avg Convergence Divergence",c:"Momentum Avg Chart Divergence",d:"Market Analysis Control Data",correct:"b"},
{question:"Breakout above resistance means?",a:"Possible uptrend",b:"Market crash",c:"Low volume",d:"Dividend payout",correct:"a"},
{question:"Stop-loss order is used to?",a:"Buy lower",b:"Limit loss",c:"Increase leverage",d:"Cancel trade",correct:"b"},
{question:"Which moving average reacts faster?",a:"SMA",b:"EMA",c:"WMA",d:"HMA",correct:"b"},
{question:"Market capitalization represents?",a:"Company profit",b:"Shares traded",c:"Company value",d:"Debt value",correct:"c"},
{question:"Bear market means?",a:"Rising market",b:"Falling market",c:"Sideways market",d:"Volatile market",correct:"b"},
{question:"Diversification helps to?",a:"Increase risk",b:"Reduce risk",c:"Increase cost",d:"Focus one stock",correct:"b"},
{question:"Which indicator measures volatility?",a:"Bollinger Bands",b:"RSI",c:"MACD",d:"EMA",correct:"a"},
{question:"Support level means?",a:"Selling pressure",b:"Buying pressure",c:"Highest price",d:"Low volume",correct:"b"},
{question:"Doji candle indicates?",a:"Strong buy",b:"Strong sell",c:"Indecision",d:"Breakout",correct:"c"},
{question:"Intraday trading means?",a:"Years holding",b:"Same day trading",c:"Monthly trading",d:"IPO buying",correct:"b"},
{question:"Leverage means?",a:"Borrowed capital",b:"Dividend",c:"Bonus share",d:"Profit ratio",correct:"a"},
{question:"PE ratio means?",a:"Price Earnings",b:"Profit Estimate",c:"Portfolio Efficiency",d:"Price Equity",correct:"a"},
{question:"Bearish reversal pattern?",a:"Double Bottom",b:"Cup Handle",c:"Head & Shoulders",d:"Triangle",correct:"c"},
{question:"Volume means?",a:"Shares traded",b:"Profit",c:"Investors",d:"Volatility",correct:"a"},
{question:"Breakout means?",a:"Price breaks key level",b:"Market close",c:"Dividend",d:"IPO",correct:"a"},
{question:"Blue chip stock?",a:"New stock",b:"Reliable large company",c:"Penny stock",d:"Foreign stock",correct:"b"},
{question:"Short term trading style?",a:"Position",b:"Swing",c:"Intraday",d:"Long term",correct:"c"},
{question:"Gap up means?",a:"Open higher",b:"Open lower",c:"Flat market",d:"Low liquidity",correct:"a"},
{question:"Limit order means?",a:"Instant order",b:"Specific price order",c:"Next day order",d:"No price order",correct:"b"},
{question:"SEBI role?",a:"Print money",b:"Regulate market",c:"Give loans",d:"Run companies",correct:"b"},
{question:"India main index?",a:"Nifty 50",b:"Dow Jones",c:"Nasdaq",d:"FTSE",correct:"a"},
{question:"Candlestick shows?",a:"Profit",b:"Price movement",c:"GDP",d:"Economy",correct:"b"},
{question:"Trailing stop loss?",a:"Fixed stop",b:"Moving stop loss",c:"Manual stop",d:"Broker stop",correct:"b"},
{question:"Swing trading?",a:"Days to weeks",b:"Minutes",c:"Years",d:"Options only",correct:"a"},
{question:"IPO stands for?",a:"Initial Public Offering",b:"Investment Profit Option",c:"Index Price Option",d:"Portfolio Order",correct:"a"},
{question:"Fundamental analysis studies?",a:"Charts",b:"Company financials",c:"Indicators",d:"Psychology",correct:"b"},
{question:"Risk management means?",a:"Avoid trading",b:"Manage losses",c:"Buy more",d:"Random trade",correct:"b"}

];

questions.sort(()=>Math.random()-0.5);

let index=0;
let score=0;
let selected="";

function loadQuestion(){

let q=questions[index];

document.getElementById("quiz").innerHTML=
`
<h3>${q.question}</h3>

<div class="option" onclick="select('a')">A. ${q.a}</div>
<div class="option" onclick="select('b')">B. ${q.b}</div>
<div class="option" onclick="select('c')">C. ${q.c}</div>
<div class="option" onclick="select('d')">D. ${q.d}</div>
`;

}

function select(opt){
selected=opt;
}

function nextQuestion(){

if(selected===questions[index].correct){
score++;
}

selected="";

index++;

if(index<questions.length){
loadQuestion();
}else{
finishQuiz();
}

}

function finishQuiz(){

let percentage=Math.round((score/questions.length)*100);

document.getElementById("result").innerHTML=
`<h2>Your Score: ${score}/30 (${percentage}%)</h2>`;

if(percentage>=60){

document.getElementById("downloadBtn").style.display="inline";

let name=document.getElementById("username").value;

document.getElementById("certName").innerText=name;
document.getElementById("certScore").innerText="Score: "+percentage+"%";

document.getElementById("certificate").style.display="block";

}

}

loadQuestion();


let time=600;

let timer=setInterval(function(){

let minutes=Math.floor(time/60);
let seconds=time%60;

if(seconds<10) seconds="0"+seconds;

document.getElementById("timer").innerText="Time: "+minutes+":"+seconds;

time--;

if(time<0){

clearInterval(timer);

finishQuiz();

}

},1000);


function downloadCertificate(){

let cert=document.getElementById("certificate");

html2canvas(cert).then(canvas=>{
let link=document.createElement("a");
link.download="certificate.png";
link.href=canvas.toDataURL();
link.click();
});

}

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
