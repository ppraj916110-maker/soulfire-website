<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Trading Quiz | Trading Ek Mission</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:0;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

h1{
color:#22c55e;
}

.timer{
font-size:20px;
margin-bottom:20px;
color:#facc15;
}

.question{
font-size:22px;
margin:20px 0;
}

.options button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
cursor:pointer;
transition:0.3s;
}

.options button:hover{
background:#22c55e;
}

.next-btn{
margin-top:20px;
padding:12px 30px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
display:none;
margin-top:30px;
}

.certificate{
display:none;
margin-top:30px;
}

canvas{
background:white;
border-radius:10px;
}

.download-btn{
margin-top:15px;
padding:10px 20px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
border-radius:6px;
border:none;
margin:10px;
width:250px;
}

.start-btn{
padding:10px 20px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>


<body>

<div class="container">

<h1>Advanced Trading Quiz</h1>


<!-- NAME SECTION -->

<div id="nameSection">

<h2>Enter Your Name</h2>

<input type="text" id="userName" placeholder="Enter your full name">

<br>

<button class="start-btn" onclick="startQuiz()">Start Quiz</button>

</div>


<!-- TIMER -->

<div class="timer">
⏳ Time Left: <span id="time">20:00</span>
</div>


<!-- QUIZ BOX -->

<div id="quizBox" style="display:none;">

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<button class="next-btn" onclick="nextQuestion()">Next</button>

</div>


<!-- RESULT -->

<div class="result" id="result"></div>


<!-- CERTIFICATE -->

<div class="certificate" id="certificate">

<h2>🎓 Your Certificate</h2>

<canvas id="certCanvas" width="900" height="600"></canvas>

<br>

<button class="download-btn" onclick="downloadCert()">Download Certificate</button>

</div>

</div>


<script>


/* USER NAME */

let studentName="";


function startQuiz(){

let name=document.getElementById("userName").value.trim();

if(name===""){

alert("Please enter your name to start the quiz.");

return;

}

studentName=name;

document.getElementById("nameSection").style.display="none";

document.getElementById("quizBox").style.display="block";

}



/* QUESTIONS */

let questions=[

{q:"What is liquidity in the market?",o:["Ease of buying/selling","Company profit","Broker fee","Dividend"],a:0},

{q:"What does EMA stand for?",o:["Exponential Moving Average","Equity Market Analysis","Economic Market Average","Extended Market Analysis"],a:0},

{q:"What does RSI measure?",o:["Momentum","Volume","Liquidity","Market Cap"],a:0},

{q:"What is breakout trading?",o:["Price moving above resistance","Price falling","Sideways market","Dividend payout"],a:0},

{q:"What is support level?",o:["Price floor","Price ceiling","Broker level","Tax level"],a:0},

{q:"What is resistance level?",o:["Price ceiling","Price floor","Broker charge","Risk ratio"],a:0},

{q:"What does MACD indicate?",o:["Trend & momentum","Volume","Dividend","Tax"],a:0},

{q:"What is volume in trading?",o:["Number of shares traded","Profit amount","Price level","Broker commission"],a:0},

{q:"What is scalping?",o:["Very short-term trades","Long-term investing","Dividend trading","ETF trading"],a:0},

{q:"What is swing trading?",o:["Holding for days","Holding for seconds","Holding for years","IPO investing"],a:0},

{q:"What does ATR measure?",o:["Volatility","Profit","Dividend","Tax"],a:0},

{q:"What is leverage?",o:["Borrowed capital","Company debt","Dividend payout","Market cap"],a:0},

{q:"What is margin trading?",o:["Borrowed trading funds","Cash trade","IPO trading","ETF trade"],a:0},

{q:"What does candlestick show?",o:["Price action","Dividend","Company news","Tax data"],a:0},

{q:"What is trendline?",o:["Line connecting highs/lows","Volume bar","Dividend line","Tax line"],a:0},

{q:"What is risk-reward ratio?",o:["Risk vs potential profit","Profit tax","Brokerage ratio","Dividend yield"],a:0},

{q:"What is Fibonacci retracement?",o:["Support/resistance tool","Tax calculation","Broker fee","Dividend method"],a:0},

{q:"What does VWAP indicate?",o:["Average traded price","Market cap","Dividend yield","Tax level"],a:0},

{q:"What is a bull trap?",o:["False breakout upward","True breakout","Market crash","Dividend cut"],a:0},

{q:"What is a bear trap?",o:["False breakdown","True breakout","IPO rally","Dividend rise"],a:0},

{q:"What is price action trading?",o:["Trading based on price movement","Dividend investing","ETF trading","Mutual fund trading"],a:0},

{q:"What is gap up?",o:["Opening above previous close","Opening lower","Flat opening","No trade"],a:0},

{q:"What is gap down?",o:["Opening below previous close","Opening higher","Flat opening","Dividend gap"],a:0},

{q:"What is consolidation?",o:["Sideways market","Bull market","Bear market","IPO rally"],a:0},

{q:"What is breakout confirmation?",o:["Volume support","Dividend increase","Tax reduction","Broker fee"],a:0},

{q:"What is trend reversal?",o:["Trend changing direction","Volume spike","Dividend payout","Market halt"],a:0},

{q:"What is fake breakout?",o:["False resistance break","True breakout","IPO rally","Dividend spike"],a:0},

{q:"What is position sizing?",o:["Capital allocation","Dividend amount","Broker fee","Tax"],a:0},

{q:"What is trading psychology?",o:["Trader emotions","Market cap","Dividend yield","Broker margin"],a:0},

{q:"What is risk management?",o:["Controlling losses","Max profit","Dividend strategy","IPO investing"],a:0}

];


/* RANDOMIZE ANSWERS */

questions.forEach(q=>{

let correct=q.o[q.a];

q.o=q.o.sort(()=>Math.random()-0.5);

q.a=q.o.indexOf(correct);

});


/* RANDOMIZE QUESTIONS */

questions=questions.sort(()=>Math.random()-0.5);



let current=0;

let score=0;



/* TIMER */

let time=600;

let timer=setInterval(()=>{

time--;

let m=Math.floor(time/60);

let s=time%60;

document.getElementById("time").innerText=

m+":"+(s<10?"0"+s:s);

if(time<=0){

clearInterval(timer);

finishQuiz();

}

},1000);



/* LOAD QUESTION */

function loadQuestion(){

let q=questions[current];

document.getElementById("question").innerText=(current+1)+". "+q.q;

let optionsHTML="";

q.o.forEach((opt,i)=>{

optionsHTML+=`<button onclick="selectAnswer(${i})">${opt}</button>`;

});

document.getElementById("options").innerHTML=optionsHTML;

}

let selected=null;

function selectAnswer(i){

selected=i;

}



function nextQuestion(){

if(selected===questions[current].a){

score++;

}

selected=null;

current++;

if(current<questions.length){

loadQuestion();

}else{

finishQuiz();

}

}



/* FINISH QUIZ */

function finishQuiz(){

document.getElementById("quizBox").style.display="none";

let percent=Math.round((score/questions.length)*100);

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=

`<h2>Your Score: ${score}/30</h2>

<h3>${percent}%</h3>`;

if(percent>=60){

generateCertificate(percent);

}

}



/* CERTIFICATE */

function generateCertificate(percent){

document.getElementById("certificate").style.display="block";

let canvas=document.getElementById("certCanvas");

let ctx=canvas.getContext("2d");

ctx.fillStyle="#fff";

ctx.fillRect(0,0,900,600);

let logo=new Image();

logo.src="logo.png";

logo.onload=function(){

ctx.drawImage(logo,380,40,140,140);

ctx.fillStyle="#000";

ctx.font="40px serif";

ctx.fillText("Certificate of Completion",240,220);

ctx.font="30px serif";

ctx.fillText(studentName,350,300);

ctx.font="22px serif";

ctx.fillText("Successfully Completed Advanced Trading Quiz",170,360);

ctx.fillText("Score: "+percent+"%",380,410);

ctx.fillText("Trading Ek Mission",350,480);

}

}



/* DOWNLOAD */

function downloadCert(){

let link=document.createElement("a");

link.download="TradingEkMission-Certificate.png";

link.href=document.getElementById("certCanvas").toDataURL();

link.click();

}



loadQuestion();

</script>

</body>
</html>
